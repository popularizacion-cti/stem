<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio de Recursos para la Educación en CTI</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Repositorio de Recursos para la Educación en CTI</h1>
            <p>Herramientas, plataformas y recursos para potenciar el aprendizaje y la enseñanza en Ciencia, Tecnología e Innovación</p>
        </div>
    </header>

    <main>
        <section class="filtros">
            <button class="filter-btn active" data-filter="all">Todos</button>
            <button class="filter-btn" data-filter="gratuita">Gratuitas</button>
            <button class="filter-btn" data-filter="estudiantes">Para Estudiantes</button>
            <button class="filter-btn" data-filter="docentes">Para Docentes</button>
            <button class="filter-btn" data-filter="cyt">Ciencia y Tecnología</button>
            <button class="filter-btn" data-filter="matematica">Matemática</button>
            <button class="filter-btn" data-filter="programacion">Programación</button>
            <button class="filter-btn" data-filter="espanol">Español</button>
            <button class="filter-btn" data-filter="ingles">Inglés</button>
        </section>

        <section id="contenedor-enlaces" class="grid-container">
            </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
