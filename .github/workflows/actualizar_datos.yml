name: Actualizar Observatorio STEM

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# ¡ESTA ES LA CLAVE PARA SOLUCIONAR EL ERROR 128!
# Le da permiso explícito al bot para guardar archivos en tu repositorio.
permissions:
  contents: write

jobs:
  actualizar-datos:
    runs-on: ubuntu-latest

    steps:
      # Actualizado a v4 para solucionar la advertencia
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      # Actualizado a v5 para solucionar la advertencia
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Ejecutar el scraper
        run: python data/scraper.py

      - name: Commit y Push de los nuevos datos
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add data/datos.json
          git commit -m "Actualización automática de datos desde Google Drive" || echo "No hay cambios para actualizar"
          git push
