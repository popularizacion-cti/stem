name: Actualizar Observatorio STEM

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-datos:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
        with:
          # Esto le asegura a Git que estamos trabajando en tu rama principal
          ref: ${{ github.ref }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Ejecutar el scraper
        run: python data/scraper.py

      # Esta acción hace el commit y push sin lanzar el error 128
      - name: Guardar cambios en el repositorio
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Actualización automática de datos desde Google Drive"
          file_pattern: 'data/datos.json'
